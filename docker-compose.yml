services:
  bot-db:
    build:
      context: .
      dockerfile: dbservice/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_LISTEN_ADDR: ":8080"
      DATABASE_PATH: /app/data/bot.sqlite3
    volumes:
      - ./data:/app/data

  telegram-nextcloud-bot:
    build: .
    restart: unless-stopped
    depends_on:
      - bot-db
    env_file:
      - .env
    environment:
      DATABASE_URL: http://bot-db:8080
    volumes:
      - ./data:/app/data
      - ./backups:/app/backups
      - ./logs:/app/logs
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "${NEXTCLOUD_HOSTNAME:-cloud.example.com}:host-gateway"
