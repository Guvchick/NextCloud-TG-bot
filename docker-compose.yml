services:
  telegram-nextcloud-bot:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./backups:/app/backups
      - ./logs:/app/logs
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "${NEXTCLOUD_HOSTNAME:-cloud.example.com}:host-gateway"
