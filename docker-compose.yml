services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bot}
      POSTGRES_USER: ${POSTGRES_USER:-bot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bot} -d ${POSTGRES_DB:-bot}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  telegram-bot-api:
    image: tdlight/tdlightbotapi:latest
    restart: unless-stopped
    profiles:
      - telegram-local
    env_file:
      - .env
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID:-}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH:-}
      TELEGRAM_LOCAL: "1"
      TELEGRAM_WORK_DIR: /var/lib/telegram-bot-api
      TELEGRAM_TEMP_DIR: /var/lib/telegram-bot-api/tmp
      TELEGRAM_VERBOSITY: ${TELEGRAM_VERBOSITY:-2}
    volumes:
      - telegram_bot_api_data:/var/lib/telegram-bot-api

  telegram-nextcloud-bot:
    build:
      context: .
      dockerfile: botgo/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-bot}
      POSTGRES_USER: ${POSTGRES_USER:-bot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_SSLMODE: disable
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backups:/app/backups
      - ./logs:/app/logs
      - ./data:/app/data
      - telegram_bot_api_data:/telegram-bot-api-data
    ports:
      - "${WEBHOOK_PORT:-8088}:8088"
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "${NEXTCLOUD_HOSTNAME:-cloud.example.com}:host-gateway"

volumes:
  postgres_data:
  redis_data:
  telegram_bot_api_data:
